# ============================================
# MediBook - Nginx Server Block Configuration
# ============================================
# Reverse proxy to PHP+Apache container
# ============================================

# Upstream definition for PHP application
upstream medibook_app {
    server app:80;
}

# --- HTTP Server (Development / SSL Redirect) ---
server {
    listen 80;
    server_name localhost medibook.example.com;

    # For SSL certificate verification (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reverse proxy to PHP+Apache
    location / {
        proxy_pass http://medibook_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
    }

    # Rate limit login and signup pages
    location ~ ^/(login|signup)\.php$ {
        proxy_pass http://medibook_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=login burst=3 nodelay;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|avif|svg|woff2?)$ {
        proxy_pass http://medibook_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to sensitive files
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

