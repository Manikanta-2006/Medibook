# ============================================
# MediBook - GitHub Actions CI/CD Pipeline
# ============================================
# Triggers on push to main and pull requests
# Stages: Build → Test → Push → Deploy
# ============================================

name: MediBook CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_IMAGE: medibook-app
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # =========================================
  # Stage 1: Build Docker Image
  # =========================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            -f docker/php/Dockerfile .
          echo "✅ Docker image built successfully"

      - name: 💾 Save Docker image as artifact
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} | gzip > medibook-image.tar.gz

      - name: 📦 Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: medibook-image.tar.gz
          retention-days: 1

  # =========================================
  # Stage 2: Test Application
  # =========================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🐳 Load Docker image
        run: |
          docker load < medibook-image.tar.gz

      - name: 🔍 PHP Syntax Check (Lint)
        run: |
          echo "Running PHP syntax check on all files..."
          find src/ -name "*.php" -exec php -l {} \;
          echo "✅ All PHP files passed syntax check"

      - name: 🏥 Start services with Docker Compose
        run: |
          # Create .env file for testing
          cp .env.example .env
          
          # Start all services
          docker-compose up -d
          
          echo "⏳ Waiting for MySQL to be ready..."
          sleep 30

      - name: ✅ Verify MySQL is running
        run: |
          docker-compose exec -T db mysqladmin ping -h localhost -u root -pmedibook_root_2025
          echo "✅ MySQL is running"

      - name: ✅ Verify database tables exist
        run: |
          docker-compose exec -T db mysql -u root -pmedibook_root_2025 hospital_db \
            -e "SHOW TABLES;"
          echo "✅ Database tables verified"

      - name: ✅ Verify application health
        run: |
          # Check if the app container is healthy
          docker-compose ps
          
          # Test HTTP response
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login.php)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Application is responding (HTTP $HTTP_STATUS)"
          else
            echo "❌ Application health check failed (HTTP $HTTP_STATUS)"
            docker-compose logs app
            exit 1
          fi

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker-compose down -v

  # =========================================
  # Stage 3: Push Docker Image (main only)
  # =========================================
  push:
    name: 📤 Push to Registry
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: 🐳 Load Docker image
        run: |
          docker load < medibook-image.tar.gz

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏷️ Tag and Push image
        run: |
          # Tag with commit SHA
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          
          # Tag as latest
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          
          # Push both tags
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          
          echo "✅ Image pushed to Docker Hub"

  # =========================================
  # Stage 4: Deploy to Production (main only)
  # =========================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🔐 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            
            # Navigate to project directory
            cd /opt/medibook
            
            # Pull latest code
            git pull origin main
            
            # Pull latest Docker images
            docker-compose pull
            
            # Rebuild and restart containers
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            
            # Clean up old images
            docker image prune -f
            
            # Verify deployment
            sleep 10
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:80 | grep -q "200"; then
              echo "✅ Deployment successful!"
            else
              echo "⚠️ Deployment completed but health check returned non-200"
            fi
            
            echo "🎉 Deployment finished at $(date)"
