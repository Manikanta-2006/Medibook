# ============================================
# MediBook - Docker Compose (Production)
# ============================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Access: http://your-domain.com (via Nginx)
# ============================================

version: '3.8'

services:
  # -----------------------------------------
  # PHP + Apache (Production overrides)
  # -----------------------------------------
  app:
    restart: always
    ports: []   # Remove direct port exposure in production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes: []  # Use built image, no volume mount
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # -----------------------------------------
  # MySQL (Production overrides)
  # -----------------------------------------
  db:
    restart: always
    ports: []   # Remove direct port exposure in production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # -----------------------------------------
  # Nginx Reverse Proxy (Production only)
  # -----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: medibook-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/var/www/certbot:ro
      - ssl_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - medibook-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # -----------------------------------------
  # phpMyAdmin is NOT included in production
  # -----------------------------------------
  phpmyadmin:
    profiles:
      - debug   # Only starts with: docker-compose --profile debug up phpmyadmin

# -----------------------------------------
# Additional Production Volumes
# -----------------------------------------
volumes:
  certbot_data:
    driver: local
  ssl_certs:
    driver: local
