# ============================================
# MediBook - Nginx Deployment
# ============================================
# Reverse proxy in front of PHP app pods
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medibook-nginx
  namespace: medibook
  labels:
    app: medibook
    tier: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medibook
      tier: proxy
  template:
    metadata:
      labels:
        app: medibook
        tier: proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: nginx-config
          configMap:
            name: medibook-nginx-config
