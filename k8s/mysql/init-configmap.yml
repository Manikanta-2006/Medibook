    Ward', 20, 6),\r\n    (4, 'General Ward', 90, 18), (4, 'ICU', 25, 6), (4, 'Private
    Room', 35, 10), (4, 'Oncology Ward', 20, 5), (4, 'Emergency', 15, 4),\r\n    (5,
    'General Ward', 70, 12), (5, 'ICU', 10, 3), (5, 'Private Room', 20, 7), (5, 'Neurology
    Ward', 15, 4), (5, 'Orthopedic Ward', 15, 5), (5, 'Emergency', 10, 2),\r\n    (6,
    'General Ward', 85, 16), (6, 'ICU', 18, 5), (6, 'Private Room', 28, 9), (6, 'Pediatric
    Ward', 20, 6), (6, 'Emergency', 12, 3),\r\n    (7, 'General Ward', 110, 22), (7,
    'ICU-1', 28, 8), (7, 'Private Room', 38, 11), (7, 'Cardiology Ward', 25, 7), (7,
    'Emergency', 18, 4), (7, 'Surgical Ward', 20, 6),\r\n    (8, 'General Ward', 60,
    10), (8, 'ICU', 12, 3), (8, 'Private Room', 22, 6), (8, 'Oncology Ward', 15, 4),
    (8, 'Emergency', 10, 2),\r\n    (9, 'General Ward', 130, 28), (9, 'ICU-1', 35,
    9), (9, 'Private Room', 45, 14), (9, 'Neurology Ward', 25, 8), (9, 'Emergency',
    22, 6), (9, 'Pediatric Ward', 30, 10), (9, 'Surgical Ward', 25, 7);\r\n\r\n--
    Insert inventory (50 rows, ~5-6 per hospital)\r\nINSERT INTO inventory (hospital_id,
    item_name, category, quantity)\r\nVALUES\r\n    (1, 'Paracetamol', 'Medicine',
    500), (1, 'Ventilator', 'Equipment', 10), (1, 'Syringes', 'Consumable', 1000),
    (1, 'Aspirin', 'Medicine', 300), (1, 'ECG Machine', 'Equipment', 5), (1, 'Gloves',
    'Consumable', 2000),\r\n    (2, 'Ibuprofen', 'Medicine', 400), (2, 'Defibrillator',
    'Equipment', 8), (2, 'Masks', 'Consumable', 1500), (2, 'Ceftriaxone', 'Medicine',
    200), (2, 'Bandages', 'Consumable', 800),\r\n    (3, 'Amoxicillin', 'Medicine',
    600), (3, 'Ultrasound Machine', 'Equipment', 4), (3, 'IV Drips', 'Consumable',
    500), (3, 'Metformin', 'Medicine', 350), (3, 'Oxygen Concentrator', 'Equipment',
    6), (3, 'Gauze', 'Consumable', 1200),\r\n    (4, 'Losartan', 'Medicine', 250),
    (4, 'X-Ray Machine', 'Equipment', 3), (4, 'Alcohol Swabs', 'Consumable', 1000),
    (4, 'Doxycycline', 'Medicine', 150), (4, 'Catheters', 'Consumable', 600),\r\n
    \   (5, 'Salbutamol', 'Medicine', 300), (5, 'Pulse Oximeter', 'Equipment', 10),
    (5, 'Surgical Masks', 'Consumable', 2000), (5, 'Atenolol', 'Medicine', 450), (5,
    'Needles', 'Consumable', 1500), (5, 'MRI Scanner', 'Equipment', 2),\r\n    (6,
    'Omeprazole', 'Medicine', 200), (6, 'CT Scanner', 'Equipment', 3), (6, 'Insulin',
    'Medicine', 400), (6, 'IV Cannula', 'Consumable', 800), (6, 'Nebulizer', 'Equipment',
    5),\r\n    (7, 'Levothyroxine', 'Medicine', 250), (7, 'Dialysis Machine', 'Equipment',
    4), (7, 'Sterile Pads', 'Consumable', 900), (7, 'Azithromycin', 'Medicine', 200),
    (7, 'Suture Kits', 'Consumable', 300), (7, 'Endoscope', 'Equipment', 3),\r\n    (8,
    'Cetirizine', 'Medicine', 350), (8, 'Infusion Pump', 'Equipment', 6), (8, 'Disposable
    Gowns', 'Consumable', 700), (8, 'Pantoprazole', 'Medicine', 150), (8, 'Thermometers',
    'Equipment', 20),\r\n    (9, 'Enalapril', 'Medicine', 300), (9, 'Anesthesia Machine',
