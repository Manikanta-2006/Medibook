data:
  01-init.sql: "-- Drop and recreate database to avoid foreign key issues\r\nDROP
    DATABASE IF EXISTS hospital_db;\r\nCREATE DATABASE hospital_db;\r\nUSE hospital_db;\r\n\r\n--
    Create users table\r\nCREATE TABLE users (\r\n    id INT AUTO_INCREMENT PRIMARY
    KEY,\r\n    username VARCHAR(50) NOT NULL UNIQUE,\r\n    full_name VARCHAR(100)
    NOT NULL,\r\n    email VARCHAR(100) NOT NULL UNIQUE,\r\n    password VARCHAR(255)
    NOT NULL,\r\n    phone VARCHAR(15),\r\n    address TEXT,\r\n    dob DATE,\r\n
    \   gender ENUM('Male', 'Female', 'Other'),\r\n    created_at TIMESTAMP DEFAULT
    CURRENT_TIMESTAMP\r\n);\r\n\r\n-- Create hospitals table\r\nCREATE TABLE hospitals
    (\r\n    id INT AUTO_INCREMENT PRIMARY KEY,\r\n    name VARCHAR(100) NOT NULL,\r\n
    \   address TEXT NOT NULL,\r\n    specialties TEXT NOT NULL,\r\n    rating FLOAT
    NOT NULL,\r\n    slots_available INT NOT NULL\r\n);\r\n\r\n-- Create appointments
    table\r\nCREATE TABLE appointments (\r\n    id INT AUTO_INCREMENT PRIMARY KEY,\r\n
    \   user_id INT NOT NULL,\r\n    hospital_id INT NOT NULL,\r\n    department VARCHAR(100)
    NOT NULL,\r\n    appointment_date DATE NOT NULL,\r\n    time_slot VARCHAR(50)
    NOT NULL,\r\n    reason TEXT,\r\n    status VARCHAR(20) NOT NULL DEFAULT 'Scheduled',\r\n
    \   FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,\r\n    FOREIGN
    KEY (hospital_id) REFERENCES hospitals(id) ON DELETE CASCADE\r\n);\r\n\r\n-- Create
    beds table\r\nCREATE TABLE beds (\r\n    id INT AUTO_INCREMENT PRIMARY KEY,\r\n
    \   hospital_id INT NOT NULL,\r\n    ward_type VARCHAR(50) NOT NULL,\r\n    total_beds
    INT NOT NULL,\r\n    available_beds INT NOT NULL,\r\n    last_updated TIMESTAMP
    DEFAULT CURRENT_TIMESTAMP,\r\n    FOREIGN KEY (hospital_id) REFERENCES hospitals(id)
    ON DELETE CASCADE\r\n);\r\n\r\n-- Create inventory table\r\nCREATE TABLE inventory
    (\r\n    id INT AUTO_INCREMENT PRIMARY KEY,\r\n    hospital_id INT NOT NULL,\r\n
    \   item_name VARCHAR(100) NOT NULL,\r\n    category ENUM('Medicine', 'Equipment',
    'Consumable') NOT NULL,\r\n    quantity INT NOT NULL,\r\n    last_updated TIMESTAMP
    DEFAULT CURRENT_TIMESTAMP,\r\n    FOREIGN KEY (hospital_id) REFERENCES hospitals(id)
    ON DELETE CASCADE\r\n);\r\n\r\n-- Insert user (Kotapati Chandeep)\r\nINSERT INTO
    users (id, username, full_name, email, password, phone, address, dob, gender)\r\nVALUES
    (\r\n    1,\r\n    'chandeep',\r\n    'Kotapati Chandeep',\r\n    'chandeep@example.com',\r\n
    \   '$2y$10$examplehashedpassword1234567890abcdef',\r\n    '9876543210',\r\n    '123,
    Vijay Nagar, Delhi',\r\n    '1995-05-15',\r\n    'Male'\r\n);\r\n\r\n-- Insert
    9 hospitals\r\nINSERT INTO hospitals (id, name, address, specialties, rating,
    slots_available)\r\nVALUES\r\n    (1, 'AIIMS', 'Ansari Nagar, Delhi', 'Cardiology,Neurology',
    4.5, 10),\r\n    (2, 'Fortis', 'Vasant Kunj, Delhi', 'Orthopedics,Pediatrics',
    4.0, 8),\r\n    (3, 'Max', 'Saket, Delhi', 'Multi-specialty', 4.2, 12),\r\n    (4,
    'Apollo', 'Sarita Vihar, Delhi', 'Oncology,Cardiology', 4.3, 15),\r\n    (5, 'Indraprastha',
    'Mathura Road, Delhi', 'Neurology,Orthopedics', 4.1, 9),\r\n    (6, 'Ganga Ram',
    'Rajinder Nagar, Delhi', 'Pediatrics,Oncology', 4.4, 11),\r\n    (7, 'Medanta',
    'Gurgaon, Delhi NCR', 'Cardiology,Neurology', 4.6, 14),\r\n    (8, 'BLK', 'Pusa
    Road, Delhi', 'Orthopedics,Oncology', 4.0, 7),\r\n    (9, 'Safdarjung', 'Safdarjung
    Enclave, Delhi', 'Multi-specialty', 4.2, 13);\r\n\r\n-- Insert sample appointments
    (3 for Chandeep)\r\nINSERT INTO appointments (user_id, hospital_id, department,
    appointment_date, time_slot, reason, status)\r\nVALUES\r\n    (1, 3, 'Cardiology',
    '2025-04-18', 'Morning', 'Chest pain', 'Scheduled'),\r\n    (1, 9, 'Neurology',
    '2025-04-19', 'Afternoon', 'Headache', 'Scheduled'),\r\n    (1, 1, 'Cardiology',
    '2025-04-20', 'Evening', 'Heart checkup', 'Scheduled');\r\n\r\n-- Insert beds
    (50 rows, ~5-6 per hospital)\r\nINSERT INTO beds (hospital_id, ward_type, total_beds,
    available_beds)\r\nVALUES\r\n    (1, 'General Ward', 100, 20), (1, 'ICU-1', 20,
    5), (1, 'Private Room', 30, 10), (1, 'Emergency', 15, 3), (1, 'Pediatric Ward',
    25, 8), (1, 'Surgical Ward', 20, 6),\r\n    (2, 'General Ward', 80, 15), (2, 'ICU',
    15, 4), (2, 'Private Room', 25, 8), (2, 'Emergency', 10, 2), (2, 'Orthopedic Ward',
    20, 7),\r\n    (3, 'General Ward', 120, 25), (3, 'ICU-1', 30, 7), (3, 'Private
