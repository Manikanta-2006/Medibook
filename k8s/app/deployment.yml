# ============================================
# MediBook - PHP Application Deployment
# ============================================
# 2 replicas with autoscaling via HPA
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medibook-app
  namespace: medibook
  labels:
    app: medibook
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medibook
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: medibook
        tier: frontend
    spec:
      containers:
        - name: medibook-app
          image: 886031931326.dkr.ecr.ap-south-1.amazonaws.com/medibook-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: MYSQL_HOST
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: MYSQL_DATABASE
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: MYSQL_PASSWORD
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: APP_DEBUG
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /login.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login.php
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
