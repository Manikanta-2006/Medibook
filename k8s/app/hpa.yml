# ============================================
# MediBook - Horizontal Pod Autoscaler
# ============================================
# Scales PHP app pods based on CPU usage
# Min: 2, Max: 5 replicas
# ============================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medibook-app-hpa
  namespace: medibook
  labels:
    app: medibook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medibook-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
