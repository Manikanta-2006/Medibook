# ============================================
# MediBook - Kubernetes Secrets
# ============================================
# Base64 encoded MySQL credentials
# To encode: echo -n 'value' | base64
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: medibook-secrets
  namespace: medibook
  labels:
    app: medibook
type: Opaque
data:
  # echo -n 'medibook_root_2025' | base64
  MYSQL_ROOT_PASSWORD: bWVkaWJvb2tfcm9vdF8yMDI1
  # echo -n 'medibook_user' | base64
  MYSQL_USER: bWVkaWJvb2tfdXNlcg==
  # echo -n 'medibook_pass_2025' | base64
  MYSQL_PASSWORD: bWVkaWJvb2tfcGFzc18yMDI1
