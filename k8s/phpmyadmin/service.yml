# ============================================
# MediBook - phpMyAdmin Service
# ============================================
# NodePort: Accessible on node IP for admin use
# Access via: http://<node-ip>:30080
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: medibook-phpmyadmin-service
  namespace: medibook
  labels:
    app: medibook
    tier: admin
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: medibook
    tier: admin
